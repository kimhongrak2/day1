function buildDonut(items){const tot=items.reduce((a,b)=>a+b.value,0)||1;let a=-Math.PI/2;const segs=items.map((it,i)=>{const fr=it.value/tot,a1=a+fr*2*Math.PI;const d=arcPath(90,90,80,50,a,a1-.00001);const seg={d,op:OPS[Math.min(i,OPS.length-1)],label:it.label,value:it.value,pct:fr*100};a=a1;return seg});return{segs,total:tot}}
function buildLine(vals,labels){const L=46,R=446,T=18,B=176,mx=Math.max(...vals,1)*1.14,n=vals.length;const xs=vals.map((_,i)=>n===1?(L+R)/2:L+(R-L)*i/(n-1));const ys=vals.map(v=>B-(v/mx)*(B-T));const pts=xs.map((x,i)=>x.toFixed(1)+","+ys[i].toFixed(1)).join(" ");const area=L+","+B+" "+pts+" "+R+","+B;const dots=xs.map((x,i)=>({cx:x.toFixed(1),cy:ys[i].toFixed(1)}));const yticks=[0,1,2,3,4].map(k=>{const v=mx*k/4,y=B-(v/mx)*(B-T);return{y:y.toFixed(1),ty:(y+3).toFixed(1),label:compact(v)}});const xlabels=labels.map((lb,i)=>({x:xs[i].toFixed(1),label:lb}));return{pts,area,dots,yticks,xlabels}}
function buildBars(items){const L=46,R=446,T=22,B=172,mx=Math.max(...items.map(i=>i.value),1)*1.16,n=items.length||1;const band=(R-L)/n,bw=Math.min(band*.56,48);const bars=items.map((it,i)=>{const h=(it.value/mx)*(B-T),x=L+band*i+(band-bw)/2,y=B-h;return{x:x.toFixed(1),y:y.toFixed(1),w:bw.toFixed(1),h:Math.max(h,0).toFixed(1),cx:(x+bw/2).toFixed(1),ty:(y-5).toFixed(1),label:it.label,val:compact(it.value)}});const yticks=[0,1,2,3,4].map(k=>{const v=mx*k/4,y=B-(v/mx)*(B-T);return{y:y.toFixed(1),ty:(y+3).toFixed(1),label:compact(v)}});return{bars,yticks}}
function cfg_overseas(d){const o=d.overseas;return{title:"해외법인 실적 대시보드",kpis:[{id:"#i-won",lb:"총 매출",val:(o.totRev/1e6).toFixed(1)+"조원",sub:"7개 지역 합산 연매출"},{id:"#i-trend",lb:"총 영업이익",val:fmt(o.totOp/100)+"억원",sub:"연간 영업이익 합계"},{id:"#i-percent",lb:"평균 영업이익률",val:(o.margin*100).toFixed(2)+"%",sub:"전 법인 가중 평균"},{id:"#i-building",lb:"법인 수",val:o.count+"개",sub:"연결 대상 해외법인"}],donutTitle:"지역별 매출",donutItems:o.regions.slice().sort((a,b)=>b.rev-a.rev).map(r=>({label:r.region,value:r.rev})),lineTitle:"분기별 매출 추이",lineUnit:"(백만원)",lineVals:o.qTrend,lineLbls:["1분기","2분기","3분기","4분기"],barTitle:"법인별 영업이익 TOP 8",barUnit:"(억원)",barItems:o.subs.slice().sort((a,b)=>b.op-a.op).slice(0,8).map(s=>({label:s.code,value:s.op/100})),cols:[{l:"No.",a:"center"},{l:"법인명",a:"left"},{l:"지역",a:"center"},{l:"국가",a:"center"},{l:"사업부문",a:"left"},{l:"연매출(억원)",a:"right"},{l:"영업이익(억원)",a:"right"},{l:"영업이익률(%)",a:"right"},{l:"투자등급",a:"center"}],rows:o.subs.map((s,i)=>({s:(s.name+s.region+s.country+s.sector+s.code).toLowerCase(),cells:[{v:i+1,a:"center"},{v:s.name,a:"left"},{v:s.region,a:"center"},{v:s.country,a:"center"},{v:s.sector,a:"left"},{v:fmt(s.rev/100),a:"right"},{v:fmt(s.op/100),a:"right"},{v:(s.op/s.rev*100).toFixed(1),a:"right"},{v:s.grade,a:"center"}]}))}}
function cfg_gwangyang(d){const g=d.gwangyang;return{title:"광양터미널 운영 대시보드",kpis:[{id:"#i-tank",lb:"총 저장량",val:fmt(g.totStore)+" 천톤",sub:"4개 구역 연간 누적"},{id:"#i-arrow",lb:"총 송출량",val:fmt(g.totOut)+" 천톤",sub:"연간 송출 합계"},{id:"#i-fuel",lb:"총 벙커링",val:fmt(g.totBunker)+" 톤",sub:"선박 급유 실적"},{id:"#i-percent",lb:"평균 가동률",val:g.avgUtil.toFixed(1)+"%",sub:"구역 평균 가동률"}],donutTitle:"구역별 저장량",donutItems:g.zones.map(z=>({label:z.zone,value:z.store})),lineTitle:"월별 송출량 추이",lineUnit:"(천톤)",lineVals:g.outByMonth,lineLbls:g.months.map(m=>m.slice(5)+"월"),barTitle:"구역별 송출량",barUnit:"(천톤)",barItems:g.zones.map(z=>({label:z.zone.replace("광양 ",""),value:z.out})),cols:[{l:"No.",a:"center"},{l:"구역",a:"left"},{l:"월",a:"center"},{l:"운영지표",a:"center"},{l:"단위",a:"center"},{l:"합계",a:"right"},{l:"전월대비(%)",a:"right"},{l:"비고",a:"left"}],rows:g.rows.map((r,i)=>({s:(r.zone+r.month+r.metric+(r.note||"")).toLowerCase(),cells:[{v:i+1,a:"center"},{v:r.zone,a:"left"},{v:r.month,a:"center"},{v:r.metric,a:"center"},{v:r.unit,a:"center"},{v:fmt(r.total),a:"right"},{v:r.mom||"-",a:"right"},{v:r.note||"",a:"left"}]}))}}
function cfg_powerplant(d){const p=d.powerplant;return{title:"발전소 운영 대시보드",kpis:[{id:"#i-bolt",lb:"총 설비용량",val:fmt(p.totCap)+" MW",sub:"전 발전설비 합산"},{id:"#i-trend",lb:"연간 발전량",val:fmt(p.totGen/1000)+" GWh",sub:"연간 총 발전량"},{id:"#i-percent",lb:"평균 가동률",val:p.avgUtil.toFixed(1)+"%",sub:"전 발전소 평균"},{id:"#i-building",lb:"발전소 수",val:p.plantCount+"기",sub:"운영 중 발전설비"}],donutTitle:"사업유형별 발전량",donutItems:p.types.slice().sort((a,b)=>b.gen-a.gen).map(t=>({label:t.type,value:t.gen})),lineTitle:"월별 발전량 추이",lineUnit:"(MWh)",lineVals:p.genByMonth,lineLbls:p.months.map(m=>m.slice(5)+"월"),barTitle:"사업유형별 온실가스",barUnit:"(tCO2)",barItems:p.types.slice().sort((a,b)=>b.co2-a.co2).map(t=>({label:t.type,value:t.co2})),cols:[{l:"No.",a:"center"},{l:"월",a:"center"},{l:"발전소명",a:"left"},{l:"사업유형",a:"center"},{l:"설비용량(MW)",a:"right"},{l:"발전량(MWh)",a:"right"},{l:"가동률(%)",a:"right"},{l:"온실가스(tCO2)",a:"right"},{l:"운영상태",a:"center"}],rows:p.rows.map((r,i)=>({s:(r.month+r.name+r.type+(r.status||"")).toLowerCase(),cells:[{v:i+1,a:"center"},{v:r.month,a:"center"},{v:r.name,a:"left"},{v:r.type,a:"center"},{v:fmt(r.cap),a:"right"},{v:fmt(r.gen),a:"right"},{v:r.util.toFixed(1),a:"right"},{v:fmt(r.co2),a:"right"},{v:r.status||"",a:"center"}]}))}}
function cfg_trading(d){const t=d.trading;return{title:"글로벌 트레이딩 대시보드",kpis:[{id:"#i-won",lb:"총 거래액",val:"$"+(t.totAmount/1e9).toFixed(2)+"B",sub:"연간 거래대금"},{id:"#i-box",lb:"총 거래량",val:(t.totVol/1e6).toFixed(2)+"M톤",sub:"연간 거래물량"},{id:"#i-doc",lb:"거래 건수",val:fmt(t.count)+"건",sub:"연간 체결 건수"},{id:"#i-percent",lb:"평균 이익률",val:t.avgMargin.toFixed(2)+"%",sub:"전 거래 평균"}],donutTitle:"부문별 거래액",donutItems:t.sectors.slice().sort((a,b)=>b.amount-a.amount).map(s=>({label:s.sector,value:s.amount})),lineTitle:"월별 거래액 추이",lineUnit:"(USD)",lineVals:t.amtByMonth,lineLbls:t.months.map(m=>m.slice(5)+"월"),barTitle:"부문별 평균 이익률",barUnit:"(%)",barItems:t.sectors.slice().sort((a,b)=>b.margin-a.margin).map(s=>({label:s.sector,value:s.margin})),cols:[{l:"No.",a:"center"},{l:"거래일",a:"center"},{l:"거래번호",a:"center"},{l:"사업부문",a:"center"},{l:"제품군",a:"left"},{l:"경로",a:"left"},{l:"고객사",a:"left"},{l:"거래량(톤)",a:"right"},{l:"총액(USD)",a:"right"},{l:"이익률(%)",a:"right"}],rows:t.rows.map((r,i)=>({s:(r.id+r.sector+r.product+r.customer+r.origin+r.dest).toLowerCase(),cells:[{v:i+1,a:"center"},{v:r.date,a:"center"},{v:r.id,a:"center"},{v:r.sector,a:"center"},{v:r.product,a:"left"},{v:r.origin+" → "+r.dest,a:"left"},{v:r.customer,a:"left"},{v:fmt(r.vol),a:"right"},{v:fmt(r.amount),a:"right"},{v:r.margin.toFixed(1),a:"right"}]}))}}
function getCfg(){return({overseas:cfg_overseas,gwangyang:cfg_gwangyang,powerplant:cfg_powerplant,trading:cfg_trading})[S.tab](DATA)}
function rTitleBar(title){document.getElementById("TB").innerHTML=`<div class="title-icon" style="background:${mix(13)};color:${S.ac}">${icon("#i-globe",22,S.ac)}</div><div class="title-center"><div class="title-main">${esc(title)}</div><div class="title-sub">POSCO INTERNATIONAL · INTEGRATED PERFORMANCE</div></div><div class="title-date">${icon("#i-cal",15,"#9aa4bd")} 기준일: ${REF}</div>`}
function rDataArea(){const defs=[{id:"overseas",label:"해외법인 분기실적",sub:DATA.overseas.subs.length+"개 법인"},{id:"gwangyang",label:"광양터미널 월간운영",sub:DATA.gwangyang.rows.length+"개 항목"},{id:"powerplant",label:"발전소별 월간운영",sub:DATA.powerplant.rows.length+"개 항목"},{id:"trading",label:"트레이딩 거래내역",sub:DATA.trading.rows.length+"건"}];const tabs=defs.map(t=>{const on=t.id===S.tab;const bg=on?S.ac:"#fff",bc=on?S.ac:"#E1E7F2",fg=on?"#fff":"#33405E",sc=on?"rgba(255,255,255,.82)":"#8a96ae",ic=on?"#fff":S.ac;return`<div class="tab-card" style="border-color:${bc};background:${bg};color:${fg}" data-tab="${t.id}">${icon("#i-file",22,ic)}<div style="min-width:0"><div class="tab-label">${esc(t.label)}</div><div class="tab-sub" style="color:${sc}">${esc(t.sub)}</div></div></div>`}).join("");document.getElementById("DA").innerHTML=`<div class="data-header"><svg width="30" height="30" fill="none" stroke="${S.ac}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><use href="#i-cloud"></use></svg><div style="min-width:0"><div class="data-info-title">엑셀 데이터 연결됨</div><div class="data-info-sub">4개의 엑셀 파일이 대시보드에 연결되어 있습니다 · 카드를 선택해 데이터를 전환하세요 (.xlsx)</div></div><div class="data-badge" style="background:${mix(11)};color:${S.ac}">● 4개 파일 연결</div></div><div class="tabs-grid">${tabs}</div>`;document.querySelectorAll(".tab-card").forEach(el=>el.addEventListener("click",()=>{S.tab=el.dataset.tab;S.search="";renderAll()}))}
function rKpis(kpis){document.getElementById("KG").innerHTML=kpis.map(k=>`<div class="kpi-card"><div class="kpi-icon" style="background:${mix(11)};color:${S.ac}">${icon(k.id,25,S.ac)}</div><div style="min-width:0"><div class="kpi-label">${esc(k.lb)}</div><div class="kpi-value">${esc(k.val)}</div><div class="kpi-sub">${esc(k.sub)}</div></div></div>`).join("")}
function rCharts(cfg){const d=buildDonut(cfg.donutItems);const paths=d.segs.map(s=>`<path d="${s.d}" fill="${S.ac}" fill-opacity="${s.op}"/>`).join("");const legend=d.segs.map(s=>`<div class="leg-row"><div class="leg-dot" style="background:${S.ac};opacity:${s.op}"></div><span class="leg-name">${esc(s.label)}</span><span class="leg-pct">${s.pct.toFixed(0)}%</span></div>`).join("");const ln=buildLine(cfg.lineVals,cfg.lineLbls);const lG=ln.yticks.map(y=>`<line x1="44" x2="448" y1="${y.y}" y2="${y.y}" stroke="#EEF2F8" stroke-width="1"/><text x="40" y="${y.ty}" text-anchor="end" font-size="9.5" fill="#aab3c7">${y.label}</text>`).join("");const lD=ln.dots.map(p=>`<circle cx="${p.cx}" cy="${p.cy}" r="3.4" fill="#fff" stroke="${S.ac}" stroke-width="2"/>`).join("");const lX=ln.xlabels.map(x=>`<text x="${x.x}" y="195" text-anchor="middle" font-size="9.5" fill="#8893ad">${esc(x.label)}</text>`).join("");const br=buildBars(cfg.barItems);const bG=br.yticks.map(y=>`<line x1="44" x2="448" y1="${y.y}" y2="${y.y}" stroke="#EEF2F8" stroke-width="1"/><text x="40" y="${y.ty}" text-anchor="end" font-size="9.5" fill="#aab3c7">${y.label}</text>`).join("");const bB=br.bars.map(b=>`<rect x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" rx="3" fill="${S.ac}" fill-opacity="0.88"/><text x="${b.cx}" y="${b.ty}" text-anchor="middle" font-size="9.5" fill="#5e6a85" font-weight="600">${b.val}</text><text x="${b.cx}" y="195" text-anchor="middle" font-size="9" fill="#8893ad">${esc(b.label)}</text>`).join("");document.getElementById("CR").innerHTML=`<div class="chart-card" style="display:flex;flex-direction:column"><div class="chart-title" style="margin-bottom:6px">${esc(cfg.donutTitle)}</div><div class="donut-wrap"><svg viewBox="0 0 180 180" style="width:148px;height:148px;flex-shrink:0">${paths}<text x="90" y="84" text-anchor="middle" font-size="10" fill="#9aa4bd" font-weight="600">합계</text><text x="90" y="103" text-anchor="middle" font-size="17" fill="#16233F" font-weight="800">${compact(d.total)}</text></svg><div class="donut-legend">${legend}</div></div></div><div class="chart-card"><div class="chart-head"><div class="chart-title">${esc(cfg.lineTitle)}</div><div class="chart-unit">${esc(cfg.lineUnit)}</div></div><svg viewBox="0 0 460 200" style="width:100%;height:178px">${lG}<polygon points="${ln.area}" fill="${S.ac}" fill-opacity="0.08"/><polyline points="${ln.pts}" fill="none" stroke="${S.ac}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>${lD}${lX}</svg></div><div class="chart-card"><div class="chart-head"><div class="chart-title">${esc(cfg.barTitle)}</div><div class="chart-unit">${esc(cfg.barUnit)}</div></div><svg viewBox="0 0 460 200" style="width:100%;height:178px">${bG}${bB}</svg></div>`}
function rTable(cfg){const q=(S.search||"").toLowerCase().trim();let rows=cfg.rows;if(q)rows=rows.filter(r=>r.s.includes(q));const tot=rows.length,shown=rows.slice(0,LIMIT);const th=cfg.cols.map(c=>`<th style="text-align:${c.a}">${esc(c.l)}</th>`).join("");const tr=shown.map(r=>`<tr>${r.cells.map(c=>`<td style="text-align:${c.a}">${esc(String(c.v))}</td>`).join("")}</tr>`).join("");document.getElementById("TS").innerHTML=`<div class="table-toolbar"><span class="t-title">원본 데이터 표</span><span class="t-count">총 ${tot}건 · 상위 ${shown.length}건 표시</span><div class="t-controls"><div class="search-box">${icon("#i-search",15,"#aab3c7")}<input id="SI" type="text" placeholder="검색…" value="${esc(S.search)}"></div><button class="reset-btn" id="RB">${icon("#i-reset",14,"#aab3c7")} 초기화</button></div></div><div class="t-scroll"><table><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table></div>`;const si=document.getElementById("SI");si.addEventListener("input",e=>{S.search=e.target.value;const pos=si.selectionStart;rTable(cfg);const ns=document.getElementById("SI");ns.focus();ns.setSelectionRange(pos,pos)});document.getElementById("RB").addEventListener("click",()=>{S.search="";rTable(cfg)})}
function renderAll(){const cfg=getCfg();rTitleBar(cfg.title);rDataArea();rKpis(cfg.kpis);rCharts(cfg);rTable(cfg)}
renderAll();
</script>
